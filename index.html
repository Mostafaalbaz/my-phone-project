<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ملبَس | متجر الأزياء الشامل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14110d;
  --bg-elev:#1c1812;
  --bg-card:#221d16;
  --line:#362f25;
  --gold:#c9a24b;
  --gold-soft:#e5cd93;
  --text:#f3ede0;
  --text-dim:#a89d89;
  --danger:#b5533f;
  --success:#77925f;
  --radius:14px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; -webkit-tap-highlight-color:transparent;}
body{padding-bottom:calc(64px + var(--safe-b));min-height:100vh;}
h1,h2,h3,h4,.brand,.btn,.navlbl,.cat-label{font-family:'Cairo',sans-serif;}
img{max-width:100%; display:block;}
button{font-family:inherit; border:none; cursor:pointer; background:none; color:inherit;}
a{color:inherit; text-decoration:none;}
input,select,textarea{font-family:inherit; background:var(--bg-elev); border:1px solid var(--line); color:var(--text); border-radius:10px; padding:11px 12px; width:100%; font-size:15px;}
input::placeholder, textarea::placeholder{color:var(--text-dim);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}

/* ===== Header ===== */
header.topbar{
  position:sticky; top:0; z-index:40;
  background:linear-gradient(180deg,var(--bg) 80%, rgba(20,17,13,.85));
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  padding:12px 14px 10px;
}
.topbar-row{display:flex; align-items:center; gap:10px;}
.icon-btn{width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--line); font-size:18px; flex-shrink:0; position:relative;}
.icon-btn:active{transform:scale(.94);}
.brand{font-weight:800; font-size:21px; letter-spacing:.5px; color:var(--gold-soft); flex:1; text-align:center;}
.brand span{color:var(--gold);}
.badge{position:absolute; top:-4px; left:-4px; background:var(--gold); color:#1a1610; font-size:10px; font-weight:800; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px;}
.searchbar{margin-top:10px; display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:9px 12px;}
.searchbar input{background:none; border:none; padding:0; flex:1;}
.searchbar input:focus{outline:none;}

/* breadcrumb thread — signature element */
.thread{display:flex; align-items:center; gap:0; margin-top:12px; overflow-x:auto; padding-bottom:2px;}
.thread-node{display:flex; align-items:center; gap:6px; flex-shrink:0;}
.thread-dot{width:9px; height:9px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 3px rgba(201,162,75,.15);}
.thread-dot.dim{background:var(--line); box-shadow:none;}
.thread-label{font-size:12.5px; color:var(--gold-soft); white-space:nowrap; font-weight:700;}
.thread-label.dim{color:var(--text-dim); font-weight:500;}
.thread-line{width:22px; height:1px; background:var(--line); flex-shrink:0;}

/* ===== Layout ===== */
main{padding:16px 14px 28px;}
.section-title{font-size:17px; font-weight:800; margin:4px 0 12px; color:var(--text);}
.section-sub{font-size:12.5px; color:var(--text-dim); margin-top:-8px; margin-bottom:14px;}

/* ===== Home / Hero ===== */
.hero{padding:22px 4px 8px;}
.hero-eyebrow{font-size:11.5px; color:var(--gold); letter-spacing:2px; font-weight:700; text-transform:uppercase;}
.hero h1{font-size:26px; line-height:1.5; margin:8px 0 6px; font-weight:800;}
.hero p{color:var(--text-dim); font-size:14px; line-height:1.7;}

.gender-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px;}
.gender-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 12px; text-align:center; transition:.15s;}
.gender-card:active{transform:scale(.97); border-color:var(--gold);}
.gender-card .ic{font-size:30px; margin-bottom:8px;}
.gender-card .lbl{font-weight:700; font-size:14.5px;}
.gender-card .desc{color:var(--text-dim); font-size:11.5px; margin-top:4px; line-height:1.5;}
.gender-card.wide{grid-column:1 / -1; display:flex; align-items:center; gap:14px; text-align:right; padding:16px;}
.gender-card.wide .ic{margin:0;}

.skip-row{margin-top:20px; text-align:center;}
.skip-link{color:var(--text-dim); font-size:13px; text-decoration:underline; text-underline-offset:3px;}

/* ===== Category grid ===== */
.cat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.cat-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 10px; text-align:center;}
.cat-card:active{transform:scale(.97); border-color:var(--gold);}
.cat-card .ic{font-size:26px; margin-bottom:6px;}
.cat-label{font-size:13.5px; font-weight:700;}

/* ===== Filters ===== */
.filter-row{display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px;}
.chip{flex-shrink:0; background:var(--bg-card); border:1px solid var(--line); border-radius:20px; padding:8px 14px; font-size:12.5px; font-weight:700; color:var(--text-dim);}
.chip.active{border-color:var(--gold); color:var(--gold-soft); background:rgba(201,162,75,.1);}

/* ===== Product grid ===== */
.prod-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.prod-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; position:relative;}
.prod-card:active{border-color:var(--gold);}
.prod-img-wrap{position:relative; aspect-ratio:4/5; background:var(--bg-elev); overflow:hidden;}
.prod-img-wrap img{width:100%; height:100%; object-fit:cover;}
.sale-tag{position:absolute; top:8px; right:8px; background:var(--danger); color:#fff; font-size:10.5px; font-weight:800; padding:3px 7px; border-radius:6px;}
.fav-btn{position:absolute; top:6px; left:6px; width:30px; height:30px; border-radius:50%; background:rgba(20,17,13,.55); display:flex; align-items:center; justify-content:center; font-size:15px;}
.fav-btn.active{color:var(--danger);}
.prod-info{padding:10px 10px 12px;}
.prod-name{font-size:13px; font-weight:700; line-height:1.4; min-height:36px;}
.prod-price-row{display:flex; align-items:baseline; gap:6px; margin-top:6px;}
.prod-price{color:var(--gold-soft); font-weight:800; font-size:14.5px;}
.prod-price-old{color:var(--text-dim); font-size:11.5px; text-decoration:line-through;}
.prod-meta{color:var(--text-dim); font-size:10.5px; margin-top:3px;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-dim);}
.empty-state .ic{font-size:38px; margin-bottom:10px;}

/* ===== Product detail ===== */
.pd-img{aspect-ratio:4/5; border-radius:var(--radius); overflow:hidden; background:var(--bg-elev);}
.pd-img img{width:100%; height:100%; object-fit:cover;}
.pd-title{font-size:19px; font-weight:800; margin-top:16px;}
.pd-price-row{display:flex; align-items:baseline; gap:8px; margin-top:6px;}
.pd-price{color:var(--gold-soft); font-weight:800; font-size:20px;}
.pd-price-old{color:var(--text-dim); font-size:14px; text-decoration:line-through;}
.pd-desc{color:var(--text-dim); font-size:13.5px; line-height:1.8; margin-top:12px;}
.opt-label{font-size:13px; font-weight:700; margin-top:18px; margin-bottom:8px;}
.opt-row{display:flex; gap:8px; flex-wrap:wrap;}
.opt-pill{border:1px solid var(--line); background:var(--bg-card); border-radius:9px; padding:9px 15px; font-size:13px; font-weight:700;}
.opt-pill.selected{border-color:var(--gold); background:rgba(201,162,75,.12); color:var(--gold-soft);}
.qty-row{display:flex; align-items:center; gap:14px; margin-top:18px;}
.qty-btn{width:36px; height:36px; border-radius:9px; background:var(--bg-card); border:1px solid var(--line); font-size:18px; font-weight:800;}
.qty-val{font-size:16px; font-weight:800; min-width:20px; text-align:center;}
.pd-actions{display:flex; gap:10px; margin-top:22px; position:sticky; bottom:calc(64px + var(--safe-b) + 10px);}

.btn{display:flex; align-items:center; justify-content:center; gap:8px; border-radius:12px; padding:14px; font-weight:800; font-size:14.5px;}
.btn-primary{background:var(--gold); color:#1a1610; flex:1;}
.btn-primary:active{filter:brightness(.92);}
.btn-outline{background:var(--bg-card); border:1px solid var(--gold); color:var(--gold-soft); width:52px; flex-shrink:0;}
.btn-block{width:100%;}
.btn-secondary{background:var(--bg-card); border:1px solid var(--line); color:var(--text);}
.btn-danger-outline{background:none; border:1px solid var(--danger); color:var(--danger);}

/* ===== Cart ===== */
.cart-item{display:flex; gap:12px; background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:10px; margin-bottom:10px;}
.cart-item img{width:74px; height:88px; object-fit:cover; border-radius:9px; flex-shrink:0;}
.cart-item-info{flex:1; display:flex; flex-direction:column;}
.cart-item-name{font-size:13.5px; font-weight:700;}
.cart-item-meta{font-size:11px; color:var(--text-dim); margin-top:3px;}
.cart-item-bottom{display:flex; align-items:center; justify-content:space-between; margin-top:auto;}
.cart-qty{display:flex; align-items:center; gap:10px; background:var(--bg-elev); border-radius:8px; padding:4px 10px;}
.cart-qty button{font-size:15px; font-weight:800; color:var(--gold-soft);}
.remove-link{color:var(--danger); font-size:11.5px; font-weight:700;}
.summary-box{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-top:16px;}
.summary-row{display:flex; justify-content:space-between; font-size:13.5px; color:var(--text-dim); margin-bottom:8px;}
.summary-row.total{color:var(--text); font-weight:800; font-size:16px; border-top:1px solid var(--line); padding-top:10px; margin-top:8px;}

/* ===== Forms / checkout ===== */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--text-dim); margin-bottom:6px;}
.field-row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.radio-card{display:flex; align-items:center; gap:10px; background:var(--bg-card); border:1px solid var(--line); border-radius:11px; padding:12px; margin-bottom:9px;}
.radio-card.selected{border-color:var(--gold);}
.radio-dot{width:18px; height:18px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; position:relative;}
.radio-card.selected .radio-dot{border-color:var(--gold);}
.radio-card.selected .radio-dot::after{content:'';position:absolute; inset:3px; background:var(--gold); border-radius:50%;}
.radio-txt{flex:1;}
.radio-txt .t1{font-size:13.5px; font-weight:700;}
.radio-txt .t2{font-size:11px; color:var(--text-dim); margin-top:2px;}
.radio-price{font-size:12.5px; font-weight:800; color:var(--gold-soft);}

/* ===== Confirmation ===== */
.confirm-wrap{text-align:center; padding:40px 10px;}
.confirm-check{width:74px; height:74px; border-radius:50%; background:rgba(119,146,95,.15); border:2px solid var(--success); display:flex; align-items:center; justify-content:center; font-size:34px; margin:0 auto 18px; color:var(--success);}
.order-num{background:var(--bg-card); border:1px dashed var(--gold); border-radius:10px; padding:12px; margin:18px 0; font-weight:800; color:var(--gold-soft); letter-spacing:1px;}

/* ===== Orders ===== */
.order-card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:13px; margin-bottom:10px;}
.order-card-top{display:flex; justify-content:space-between; align-items:center;}
.order-status{font-size:10.5px; font-weight:800; padding:4px 9px; border-radius:20px; background:rgba(201,162,75,.15); color:var(--gold-soft);}

/* ===== Bottom nav ===== */
.bottom-nav{position:fixed; bottom:0; right:0; left:0; z-index:50; background:var(--bg-elev); border-top:1px solid var(--line); display:flex; padding-bottom:var(--safe-b);}
.nav-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 0 8px; color:var(--text-dim); position:relative;}
.nav-item.active{color:var(--gold-soft);}
.nav-item .ic{font-size:19px;}
.navlbl{font-size:10px; font-weight:700;}
.nav-badge{position:absolute; top:2px; left:calc(50% + 6px); background:var(--gold); color:#1a1610; font-size:9px; font-weight:800; min-width:15px; height:15px; border-radius:8px; display:flex; align-items:center; justify-content:center;}

/* ===== Toast ===== */
.toast{position:fixed; bottom:calc(70px + var(--safe-b)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--gold); color:#1a1610; padding:11px 20px; border-radius:30px; font-weight:800; font-size:13px; z-index:100; opacity:0; transition:.25s; box-shadow:0 8px 24px rgba(0,0,0,.4); white-space:nowrap;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.back-row{display:flex; align-items:center; gap:8px; margin-bottom:2px;}

@media(min-width:520px){
  .gender-grid, .cat-grid, .prod-grid{grid-template-columns:repeat(3,1fr);}
  main{max-width:520px; margin:0 auto;}
  header.topbar > *{max-width:520px; margin:0 auto;}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <button class="icon-btn" id="backBtn" style="display:none">→</button>
    <div class="brand">مَلبَس<span>.</span></div>
    <button class="icon-btn" id="searchToggle">🔍</button>
  </div>
  <div class="searchbar" id="searchBar" style="display:none">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن منتج، فستان، حذاء...">
  </div>
  <div class="thread" id="threadBar"></div>
</header>

<main id="app"></main>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-item" data-nav="home"><span class="ic">🏠</span><span class="navlbl">الرئيسية</span></button>
  <button class="nav-item" data-nav="wishlist"><span class="ic">🤍</span><span class="navlbl">المفضلة</span></button>
  <button class="nav-item" data-nav="cart"><span class="ic">🛍️</span><span class="navlbl">السلة</span><span class="nav-badge" id="cartBadge" style="display:none">0</span></button>
  <button class="nav-item" data-nav="orders"><span class="ic">📦</span><span class="navlbl">طلباتي</span></button>
</nav>

<script>
/* ========================================================
   DATA
   ======================================================== */
const GENDERS = [
  {id:'men', label:'رجالي', icon:'👔', desc:'كل ما يخص الرجل العصري'},
  {id:'women', label:'حريمي', icon:'👗', desc:'أناقة تناسب كل مناسبة'},
  {id:'kids', label:'اطفالي', icon:'🧸', desc:'راحة وألوان تناسب الصغار'},
  {id:'unisex', label:'للجنسين', icon:'🧢', desc:'قطع مشتركة تناسب الجميع'},
  {id:'special', label:'ذوو الاحتياجات الخاصة', icon:'♿', desc:'تصاميم مريحة وسهلة الارتداء', wide:true},
];

const CATEGORIES = {
  men: [
    {id:'shirts', label:'قمصان وتيشيرتات', icon:'👕'},
    {id:'pants', label:'بناطيل', icon:'👖'},
    {id:'jalabiya', label:'جلاليب', icon:'🥻'},
    {id:'shoes', label:'أحذية', icon:'👞'},
    {id:'headwear', label:'أغطية رأس', icon:'🧢'},
    {id:'accessories', label:'اكسسوارات', icon:'⌚'},
    {id:'care', label:'مستحضرات عناية', icon:'🧴'},
  ],
  women: [
    {id:'dresses', label:'فساتين', icon:'👗'},
    {id:'abaya', label:'عبايات', icon:'🧕'},
    {id:'pants', label:'بناطيل', icon:'👖'},
    {id:'hijab', label:'حجابات وإيشاربات', icon:'🧣'},
    {id:'shoes', label:'أحذية', icon:'👠'},
    {id:'underwear', label:'ملابس داخلية', icon:'👚'},
    {id:'accessories', label:'اكسسوارات', icon:'💍'},
    {id:'care', label:'مستحضرات عناية', icon:'🧴'},
  ],
  kids: [
    {id:'boys', label:'أولادي', icon:'👦'},
    {id:'girls', label:'بناتي', icon:'👧'},
    {id:'babies', label:'مواليد', icon:'👶'},
    {id:'shoes', label:'أحذية أطفال', icon:'👟'},
    {id:'accessories', label:'اكسسوارات أطفال', icon:'🎒'},
  ],
  unisex: [
    {id:'sport', label:'رياضي', icon:'🏃'},
    {id:'basics', label:'أساسيات يومية', icon:'👕'},
    {id:'accessories', label:'اكسسوارات عامة', icon:'🧢'},
  ],
  special: [
    {id:'adaptive_tops', label:'ملابس علوية تكيفية', icon:'🩹'},
    {id:'adaptive_bottoms', label:'ملابس سفلية تكيفية', icon:'🩲'},
    {id:'easy_shoes', label:'أحذية سهلة الارتداء', icon:'👟'},
    {id:'sensory', label:'ملابس حسية مريحة', icon:'🧵'},
  ],
};

const ADJ = ['كلاسيك','عصري','قطن مصري','صيفي شيك','مطرز','فاخر','يومي مريح','أنيق'];
const COLOR_POOL = ['أسود','أبيض','بيج','كحلي','رمادي','بني','أحمر عنابي','أخضر زيتي','وردي فاتح','ذهبي'];
const CLOTHING_SIZES = ['S','M','L','XL','XXL'];
const SHOE_SIZES = ['38','39','40','41','42','43','44'];
const BABY_SIZES = ['0-3 شهور','3-6 شهور','6-12 شهر','12-18 شهر'];

function pick(arr,n){ const c=[...arr]; const out=[]; for(let i=0;i<n && c.length;i++){ out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]); } return out; }
function seedRand(seed){ let x = Math.sin(seed*999)*10000; return x - Math.floor(x); }

function sizesFor(genderId, catId){
  if(catId==='shoes' || catId==='easy_shoes') return SHOE_SIZES;
  if(catId==='babies') return BABY_SIZES;
  if(['accessories','care','headwear','hijab'].includes(catId)) return ['مقاس واحد'];
  return CLOTHING_SIZES;
}

let PRODUCTS = [];
let pid = 1;
GENDERS.forEach(g=>{
  (CATEGORIES[g.id]||[]).forEach(c=>{
    const count = 6;
    for(let i=0;i<count;i++){
      const r = seedRand(pid*7.3);
      const adj = ADJ[Math.floor(seedRand(pid*3.1)*ADJ.length)];
      const price = Math.round((80 + seedRand(pid*5.2)*420)/5)*5;
      const onSale = r > 0.68;
      const oldPrice = onSale ? Math.round(price*(1+0.15+seedRand(pid)*0.25)/5)*5 : null;
      PRODUCTS.push({
        id:'p'+pid,
        gender:g.id,
        cat:c.id,
        name: `${c.label} ${adj}`,
        price, oldPrice,
        sizes: sizesFor(g.id,c.id),
        colors: pick(COLOR_POOL, 3),
        img: `https://picsum.photos/seed/mlabas${pid}/400/500`,
        desc: `${c.label} ${adj} بخامة عالية الجودة، تصميم يجمع بين الراحة والأناقة ويناسب الاستخدام اليومي والمناسبات.`,
      });
      pid++;
    }
  });
});

/* ========================================================
   STATE
   ======================================================== */
const state = {
  view:'home',
  gender:null,
  cat:null,
  product:null,
  sort:'default',
  cart: JSON.parse(localStorage.getItem('mlbs_cart')||'[]'),
  wishlist: JSON.parse(localStorage.getItem('mlbs_wishlist')||'[]'),
  orders: JSON.parse(localStorage.getItem('mlbs_orders')||'[]'),
  pdSize:null, pdColor:null, pdQty:1,
  searchQuery:'',
};
const history_stack = ['home'];

function save(){
  localStorage.setItem('mlbs_cart', JSON.stringify(state.cart));
  localStorage.setItem('mlbs_wishlist', JSON.stringify(state.wishlist));
  localStorage.setItem('mlbs_orders', JSON.stringify(state.orders));
}
function fmt(n){ return n.toLocaleString('ar-EG') + ' ج.م'; }
function findProduct(id){ return PRODUCTS.find(p=>p.id===id); }
function genderLabel(id){ return (GENDERS.find(g=>g.id===id)||{}).label||''; }
function catLabel(gid,cid){ const c=(CATEGORIES[gid]||[]).find(c=>c.id===cid); return c?c.label:''; }

function goto(view, opts={}){
  Object.assign(state, opts);
  state.view = view;
  history_stack.push(view);
  render();
  window.scrollTo(0,0);
}
function goBack(){
  if(history_stack.length>1){ history_stack.pop(); state.view = history_stack[history_stack.length-1]; }
  else state.view='home';
  render();
  window.scrollTo(0,0);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ========================================================
   CART / WISHLIST
   ======================================================== */
function addToCart(prodId, size, color, qty){
  const key = prodId+'|'+size+'|'+color;
  const existing = state.cart.find(i=>i.key===key);
  if(existing){ existing.qty += qty; }
  else state.cart.push({key, prodId, size, color, qty});
  save(); updateBadges(); toast('تمت الإضافة إلى السلة ✓');
}
function removeFromCart(key){ state.cart = state.cart.filter(i=>i.key!==key); save(); render(); updateBadges(); }
function changeQty(key, delta){
  const item = state.cart.find(i=>i.key===key);
  if(!item) return;
  item.qty += delta;
  if(item.qty<=0) state.cart = state.cart.filter(i=>i.key!==key);
  save(); render(); updateBadges();
}
function toggleWishlist(prodId){
  if(state.wishlist.includes(prodId)) state.wishlist = state.wishlist.filter(x=>x!==prodId);
  else { state.wishlist.push(prodId); toast('أُضيف للمفضلة ♥'); }
  save(); updateBadges(); render();
}
function cartTotal(){ return state.cart.reduce((s,i)=>{ const p=findProduct(i.prodId); return s + (p?p.price:0)*i.qty; },0); }
function cartCount(){ return state.cart.reduce((s,i)=>s+i.qty,0); }

function updateBadges(){
  const cb = document.getElementById('cartBadge');
  const cnt = cartCount();
  cb.style.display = cnt>0 ? 'flex':'none';
  cb.textContent = cnt;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.nav===state.view || (state.view==='product'&&n.dataset.nav==='home') ));
}

/* ========================================================
   RENDER: THREAD / BREADCRUMB
   ======================================================== */
function renderThread(){
  const bar = document.getElementById('threadBar');
  const steps = [];
  steps.push({label:'الرئيسية', done:true});
  if(state.gender) steps.push({label:genderLabel(state.gender), done:true});
  if(state.cat) steps.push({label:catLabel(state.gender,state.cat), done:true});
  if(state.view==='product') steps.push({label:'تفاصيل المنتج', done:true});
  if(steps.length<2){ bar.innerHTML=''; bar.style.display='none'; return; }
  bar.style.display='flex';
  bar.innerHTML = steps.map((s,i)=>`
    <div class="thread-node">
      <div class="thread-dot ${i===steps.length-1?'':''}"></div>
      <div class="thread-label ${i===steps.length-1?'':'dim'}">${s.label}</div>
    </div>
    ${i<steps.length-1?'<div class="thread-line"></div>':''}
  `).join('');
}

   ======================================================== */

  const app = document.getElementById('app');
  document.getElementById('backBtn').style.display = state.view==='home' ? 'none':'flex';

  if(state.view==='home') return renderHome(app);

  if(state.view==='product') return renderProductDetail(app);

}

  if(state._filterSize) list = list.filter(p=>p.sizes.includes(state._filterSize));
  if(state.sort==='price_asc') list = [...list].sort((a,b)=>a.price-b.price);
  if(state.sort==='price_desc') list = [...list].sort((a,b)=>b.price-a.price);
  if(state.sort==='sale') list = list.filter(p=>p.oldPrice);
  return list;
}

    ${list.length? `<div class="prod-grid">${list.map(productCardHtml).join('')}</div>` : `
      <div class="empty-state"><div class="ic">🔎</div>${q? 'مفيش نتائج مطابقة' : 'اكتب اسم المنتج اللي بتدور عليه'}</div>
    `}
  `;
  bindProductGrid(app);
}

/* ========================================================
   GLOBAL BINDINGS
   ======================================================== */
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('searchToggle').addEventListener('click', ()=>{
  const bar = document.getElementById('searchBar');
  bar.style.display = bar.style.display==='none' ? 'flex':'none';
  if(bar.style.display==='flex') document.getElementById('searchInput').focus();
});
document.getElementById('searchInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ state.searchQuery = e.target.value; goto('search'); }
});
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=>{
    const v = el.dataset.nav;
    if(v==='home'){ state.gender=null; state.cat=null; }
    goto(v);
  });
});

render();
</script>
</body>
</html>
